<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="login-body">
    
    <main class="login-container">

        
        <div class="login-card">
            
            <h2 class="title">Bem-vindo de volta</h2>
            <p class="subtitle">Acesse sua conta para continuar</p>
            
            <form class="login-form" action="" method="post">

                
                <fieldset>
         
                    <label for="login-email">Email</label>
                    <input 
                        type="email" 
                        name="login-email" 
                        id="login-email"
                        class="login-input"
                        placeholder="seu@email"
                    >
                </fieldset>

                <fieldset>

                    <label for="login-pass">Senha</label>
                    <input 
                        type="password" 
                        name="login-pass" 
                        id="login-pass"
                        class="login-input"
                        placeholder="suasenha"
                    >
                </fieldset>


                <button class="submit-button" type="submit">Entrar</button>
            </form>
            
            <section class="warning-box">
                <p>Para testes, use qualquer email e senha válidos:</p>
                
                <ul>
                    <li>Email: deve conter @email.com ou semelhante</li>
                    <li>Senha: mínimo 6 caracteres</li>
                </ul>
            </section>
            
            <p class="subtext">Não tem uma conta? <span>Cadastre-se aqui</span> </p>

        </div>

    </main>

</body>
</html>
