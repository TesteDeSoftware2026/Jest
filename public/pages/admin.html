<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Políticas Públicas</title>

    <link rel="stylesheet" href="../styles/home.css">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body id="admin">

    <header class="main-header">

        <section class="logo-box">

            <div class="logo-icon">
                ❤
            </div>

            <div>
                <h2>Saúde Mental para Todos</h2>
                <p>Plataforma de Políticas Públicas</p>
            </div>

        </section>

        <nav class="header-nav">

            <button id="btn-home" class="nav-button">
                home
            </button>

            <button id="btn-area" class="nav-button">
                Minha Área
            </button>

            <button id="btn-nome-perfil" class="nav-button">
                Usuario
            </button>

            <button id="btnLogout" class="logout-button">
                Sair
            </button>

        </nav>

    </header>


    <main class="admin-container">

        <section class="page-header">

            <h1>Painel Administrativo</h1>

            <p>
                Gerencie políticas públicas e visualize relatórios de adesão
            </p>

        </section>


        <section class="tabs-container">

            <button class="tab-button active-tab">
                Gerenciar Políticas
            </button>

            <button class="tab-button">
                Relatórios
            </button>

        </section>

        <form id="admin-form" action="" method="post">

                <fieldset>
                    <label for="form-titulo">Titulo</label>
                    <input 
                        type="text"
                        id="form-titulo"
                        class="form-input"
                    >
                </fieldset>


                <fieldset>
                    <label for="form-descricao">Descricao</label>
                    <input 
                        type="text"
                        id="form-descricao"
                        class="form-input"
                    >
                </fieldset>


                <fieldset>
                    <label for="form-publico">Publico Alvo</label>
                    <input 
                        type="text"
                        id="form-publico"
                        class="form-input"
                    >
                </fieldset>


                <fieldset>
                    <label for="form-local">Local de Atuação</label>
                    <input 
                        type="text"
                        id="form-local"
                        class="form-input"
                    >
                </fieldset>

                <fieldset>
                    <button id="btnEnviarForm" class="new-policy-button editConfirm-button" type="submit">Cadastrar</button>
                    <button id="btnCancelarCadastro" class="new-policy-button cancel-button" type="button">Cancelar</button>
                </fieldset>


            </form>


        <section class="toolbar">

            

            <input
                id="admin-search-input"
                type="text"
                placeholder="Buscar políticas..."
                class="search-input"
            >

            <button id="btnVaiCadastrar" class="new-policy-button">
                + Nova Política
            </button>

        </section>


        <section class="table-container">

            <table>

                <thead>

                    <tr>
                        <th>Política</th>
                        <th>Categoria</th>
                        <th>Região</th>
                        <th>Público-Alvo</th>
                        <th>Ações</th>
                    </tr>

                </thead>

                <tbody id="bodyTabela">

                    <!-- <tr>

                        <td>

                            <strong>
                                CAPS - Centro de Atenção Psicossocial
                            </strong>

                            <p>
                                Atendimento integral em saúde mental...
                            </p>

                        </td>

                        <td>
                            <span class="category-tag">
                                Saúde
                            </span>
                        </td>

                        <td>Nacional</td>

                        <td>
                            Pessoas com transtornos mentais graves
                        </td>

                        <td class="actions-cell">

                            <button class="edit-button">
                                ✏
                            </button>

                            <button class="delete-button">
                                🗑
                            </button>

                        </td>

                    </tr> -->

                </tbody>

            </table>

        </section>

    </main>

    <script src="../script.js"></script>

</body>
